# ============================================================
#  SubConverter-Extended 配置
#  外部配置：ACL4SSR_Online_Full_MultiMode
#  额外规则集：ACL4SSR 全部规则
# ============================================================

version = 1

[common]
default_url = []
enable_insert = true
insert_url = []
prepend_insert_url = true

exclude_remarks = ["(到期|剩余流量|时间|官网|产品|平台|套餐|过期|联系|客服|续费|网址|channel)"]

default_external_config = "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/config/ACL4SSR_Online_Full_MultiMode.ini"
base_path = "base"

clash_rule_base = "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/GeneralClashConfig.yml"
surge_rule_base = "https://raw.githubusercontent.com/DivineEngine/Profiles/master/Surge/G.conf"
surfboard_rule_base = "https://raw.githubusercontent.com/DivineEngine/Profiles/master/Surge/G.conf"
loon_rule_base = "https://raw.githubusercontent.com/Loon0xTool/Loon/main/Loon_CN.conf"
quanx_rule_base = "https://raw.githubusercontent.com/DivineEngine/Profiles/master/Quantumult/X.conf"
mellow_rule_base = ""
sssub_rule_base = ""
singbox_rule_base = ""

proxy_config = "NONE"
proxy_ruleset = "NONE"
proxy_subscription = "NONE"
append_proxy_type = false
reload_conf_on_request = false

[custom_openclash_rules]
fallback_enabled = false

[[userinfo.stream_rule]]
match = '^剩余流量：(.*?)\|总流量：(.*)$'
replace = 'total=$2&left=$1'

[[userinfo.stream_rule]]
match = '^剩余流量：(.*?) (.*?)$'
replace = 'total=$1&left=$2'

[[userinfo.stream_rule]]
match = '^Bandwidth: (.*?)/(.*)$'
replace = 'used=$1&total=$2'

[[userinfo.stream_rule]]
match = '^.*?剩余(.*?)(?:\s*?)@(?:.*)$'
replace = 'total=$1'

[[userinfo.time_rule]]
match = '^过期时间：(\d+)-(\d+)-(\d+) (\d+):(\d+):(\d+)$'
replace = '$1:$2:$3:$4:$5:$6'

[[userinfo.time_rule]]
match = '^到期时间:(\d+)-(\d+)-(\d+)$'
replace = '$1:$2:$3:0:0:0'

[node_pref]
sort_flag = false
filter_deprecated_nodes = true
append_sub_userinfo = true
clash_use_new_field_name = true
clash_proxies_style = "flow"
clash_proxy_groups_style = "flow"
singbox_add_clash_modes = true

[[node_pref.rename_node]]
match = '\(?((x|X)?(\d+)(\.?\d+)?)((\s?倍率?)|(x|X))\)?'
replace = "$1x"

[managed_config]
write_managed_config = true
managed_config_prefix = "http://127.0.0.1:25500"
config_update_interval = 86400
config_update_strict = false
quanx_device_id = ""

[surge_external_proxy]
resolve_hostname = true

[security]
profile = "lan"
allow_public_upload = false

[statistics]
enabled = true
data_dir = "stats"
flush_interval = 5

[statistics.geo]
provider = "header"
country_headers = ["CF-IPCountry", "X-Geo-Country", "X-Vercel-IP-Country", "CloudFront-Viewer-Country"]

[statistics.dashboard_auth]
enabled = false
username = ""
password = ""
max_failures = 5
window_seconds = 300
lock_seconds = 900

[emojis]
add_emoji = true
remove_old_emoji = true

[[emojis.emoji]]
match = '(流量|时间|应急)'
emoji = '🏳️‍🌈'

[[emojis.emoji]]
match = '(美|美国|United States|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥)'
