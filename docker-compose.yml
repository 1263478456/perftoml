# ============================================================
#  订阅转换服务
#  All-in-One 模式：一条命令搞定
#  也支持分拆模式（见下方注释）
# ============================================================

version: '3.8'

services:
  # ==========================================================
  #  方式一：All-in-One（推荐）
  #  subconverter + sub-web + Nginx 打包在一个镜像里
  # ==========================================================
  sub-converter:
    image: 1263478456/sub-converter:latest
    container_name: sub-converter
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:80"

