; ============================================================
;  subconverter 配置文件
;  集成 ACL4SSR 规则集，适合中国大陆用户
;  文档：https://github.com/tindy2013/subconverter/blob/master/README-cn.md
; ============================================================

[common]
; API 模式 - false 为私有部署（推荐），true 为公共服务
api_mode = false

; API 访问令牌 - 私有部署时建议设置，保护敏感接口
api_access_token = subconverter2024

; 默认订阅链接 - 不填写 url 参数时使用（留空则禁用）
default_url =

; 排除匹配到的节点（正则匹配）- 过滤流量信息、广告节点
exclude_remarks = (到期|剩余流量|时间|官网|产品|平台|套餐|过期|联系|客服|续费|网址|channel)

; 仅保留匹配到的节点（留空则保留全部）
include_remarks =

; 为所有节点使用自定义 JS 代码进行筛选
enable_filter = false
filter_script =

; 默认外部配置文件 - 使用 ACL4SSR 在线配置
default_external_config = https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/config/ACL4SSR_Online_Full_MultiMode.ini

; 基础路径 - 限制外部配置可以使用的本地配置文件基础路径
base_path = base

; ============================================================
;  各客户端模板文件（基础配置）
;  推荐使用 ACL4SSR 的 GeneralClashConfig 作为 Clash 模板
; ============================================================

; Clash 配置模板
clash_rule_base = https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/GeneralClashConfig.yml

; Surge 配置模板
surge_rule_base = https://raw.githubusercontent.com/DivineEngine/Profiles/master/Surge/G.conf

; Surfboard 配置模板
surfboard_rule_base = https://raw.githubusercontent.com/DivineEngine/Profiles/master/Surge/G.conf

; Loon 配置模板
loon_rule_base = https://raw.githubusercontent.com/Loon0xTool/Loon/main/Loon_CN.conf

; Quantumult X 配置模板
quanx_rule_base = https://raw.githubusercontent.com/DivineEngine/Profiles/master/Quantumult/X.conf

; Mellow 配置模板
mellow_rule_base =

; sing-box 配置模板
singbox_rule_base =

; SS 订阅模板
sssub_rule_base =

; ============================================================
;  代理设置 - 用于下载订阅/规则/配置
;  NONE = 不使用代理
;  SYSTEM = 使用系统代理
;  支持 http/https/socks4a/socks5
; ============================================================

; 下载配置文件时使用的代理
proxy_config = NONE

; 下载规则时使用的代理
proxy_ruleset = NONE

; 下载原始订阅时使用的代理
proxy_subscription = NONE

; 节点名称是否加入类型前缀 [SS] [SSR] [VMess]
append_proxy_type = false

[userinfo]
; 从节点名中提取流量信息的规则
stream_rule = ^剩余流量：(.*?)\|总流量：(.*)$|total=$2&left=$1
stream_rule = ^剩余流量：(.*?) (.*?)$|total=$1&left=$2
stream_rule = ^Bandwidth: (.*?)/(.*)$|used=$1&total=$2
stream_rule = ^\[.*?\]剩余(.*?)@(?:.*)$|total=$1

; 从节点名中提取时间信息的规则
time_rule = ^过期时间：(\d+)-(\d+)-(\d+) (\d+):(\d+):(\d+)$|$1:$2:$3:$4:$5:$6
time_rule = ^到期时间(:|：)(\d+)-(\d+)-(\d+)$|$1:$2:$3:0:0:0
time_rule = ^.*?流量:(?:.*?) 剩:(.*)$|left=$1d

[node_pref]
; 是否开启 UDP
udp_flag = false

; 是否开启 TCP Fast Open
tcp_fast_open_flag = false

; 是否跳过 TLS 证书验证
skip_cert_verify_flag = false

; 是否开启 TLS 1.3
tls13_flag = false

; 是否对节点排序
sort_flag = false

; 是否排除目标类型不支持的节点
filter_deprecated_nodes = true

; 在 header 中加入流量信息
append_sub_userinfo = true

; 使用 Clash 新字段名
clash_use_new_field_name = true

; Clash proxies 风格：block/flow/compact
clash_proxies_style = flow

; 节点重命名规则（支持正则）
; 格式：原始名称@新名称
rename_node = 中国@中
rename_node = \(?((x|X)?(\d+)(\.?\d+)?)((\s?倍率?:?)|(x|X))\)?@(倍率:$1)

[managed_config]
; 是否将 MANAGED-CONFIG 信息附加到 Surge/Surfboard 配置
write_managed_config = true

; 更新地址前缀 - 部署时需要改为你服务器的实际地址
managed_config_prefix = http://127.0.0.1:25500

; 托管配置更新间隔（秒）- 86400 = 24小时
config_update_interval = 86400

; 是否在间隔后强制更新
config_update_strict = false

; Quantumult X 设备 ID
quanx_device_id =

[emojis]
; 是否在节点名称前加入 Emoji
add_emoji = true

; 是否移除原有订阅中的 Emoji
remove_old_emoji = true

; 自定义 Emoji 规则
rule = (流量|时间|应急),⌛
rule = (美|美国|United States|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥),🇺🇸
rule = (港|HK|Hong Kong|HongKong|hongkong),🇭🇰
rule = (台|新北|彰化|TW|Taiwan),🇨🇳
rule = (日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan),🇯🇵
rule = (新加坡|坡|狮城|SG|Singapore),🇸🇬
rule = (韩|首尔|韓|KR|Korea),🇰🇷
rule = (英|UK|United Kingdom),🇬🇧
rule = (德|DE|Germany),🇩🇪
rule = (法|FR|France),🇫🇷
rule = (加|CA|Canada),🇨🇦
rule = (澳|AU|Australia),🇦🇺
rule = (印度|IN|India),🇮🇳
rule = (俄|RU|Russia),🇷🇺
rule = (土|TR|Turkey),🇹🇷
rule = (荷兰|NL|Netherlands),🇳🇱

[ruleset]
; ============================================================
;  自定义规则集（ACL4SSR）
;  使用在线规则，每次请求自动更新
; ============================================================

; 启用自定义规则集
enabled = true

; 是否覆盖原始规则（模板中的规则）
overwrite_original_rules = true

; 是否根据请求更新规则集
update_ruleset_on_request = false

; 规则定义 - 格式：组名,类型:URL,更新间隔(秒)
