[template]
; 模板参数
; 可在此定义模板变量

[aliases]
; URL 别名 - 可使用简短别名代替完整 URL
; 例如：myconfig = https://example.com/config.ini

[advanced]
; 每个请求重新加载 pref 配置
reload_prefs_on_request = false

; 最大工作线程数
max_workers = 4

; 允许的最大下载大小（字节）
max_allowed_download_size = 33554432

; 启用规则缓存
enable_rule_cache = true

; 缓存大小
cache_size = 2048

; 缓存过期时间（秒）
cache_subscription = 600
cache_config = 600
cache_ruleset = 3600

[surge_external_proxy]
; 为 Surge 添加 SSR 的支持路径

[server]
; 监听地址
listen_address = 0.0.0.0

; 监听端口
listen_port = 25500
