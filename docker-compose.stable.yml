# ============================================================
#  订阅转换服务 — 后端(Extended) + 前端(subweb)
#  直接用官方镜像，零冲突，一条命令搞定
# ============================================================

version: '3.8'

services:
  # ---- 后端：SubConverter-Extended ----
  subconverter:
    image: aethersailor/subconverter-extended:latest
    container_name: subconverter
    restart: unless-stopped
    ports:
      - "25500:25500"
    volumes:
      - ./base:/base
    environment:
      - TZ=Asia/Shanghai

  # ---- 前端：subweb ----
  subweb:
    image: aethersailor/subweb:latest
    container_name: subweb
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - SITE_NAME=订阅转换
      - API_URL=http://subconverter:25500
    depends_on:
      - subconverter
