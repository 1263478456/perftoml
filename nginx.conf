worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # ---- 协议和主机名回退 ----
    map $http_x_forwarded_proto $real_scheme {
        default $http_x_forwarded_proto;
        ''      $scheme;
    }
    map $http_host $real_host {
        default $http_host;
        ''      $host;
    }

    # ---- 自定义 User-Agent 支持 ----
    # 订阅 URL 中带 ua=xxx 参数时，用该值覆盖 User-Agent 头
    # 例: /sub?target=clash&url=xxx&ua=clash.meta
    map $arg_ua $override_ua {
        default $arg_ua;
        ''      $http_user_agent;
    }

    # 后端 subconverter
    upstream subconverter {
        server 127.0.0.1:25500;
    }

    server {
        listen 80;
        server_name _;

        # ---- 前端静态文件 ----
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;

            # 动态替换默认后端地址
            sub_filter 'https://api.wcc.best' '$real_scheme://$real_host';
            sub_filter_once off;
            sub_filter_types application/javascript text/javascript;
        }

        # ---- 后端 API ----
        location ~ ^/(sub|version|getprofile|updateconf|readconf|flushcache|getruleset|render|refreshruleset) {
            proxy_pass http://subconverter;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 自定义 UA：如果 URL 中有 ua 参数，覆盖 User-Agent
            proxy_set_header User-Agent $override_ua;

            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
            proxy_connect_timeout 30s;
            proxy_read_timeout 120s;

            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
            add_header Access-Control-Allow-Headers '*';

            if ($request_method = 'OPTIONS') {
                return 204;
            }
        }

        # ---- 静态资源缓存 ----
        location ~* \.(css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            root /usr/share/nginx/html;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }
}
